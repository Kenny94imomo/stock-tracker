name: 每日抓取台股漲幅前50

on:
  schedule:
    - cron: '30 6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: 取出 repo
        uses: actions/checkout@v5

      - name: 設定 Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: 抓取資料
        run: node scripts/fetch-twse.js

      - name: 提交 data.json（若有變動）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json history.json
          if git diff --staged --quiet; then
            echo "資料無變動，略過提交"
          else
            git commit -m "自動更新漲幅前50 $(date +%Y-%m-%d)"
            git push
          fi
